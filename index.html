<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO -->
    <title>CivicPulse AI — Community Issues. Visible Action.</title>
    <meta
      name="description"
      content="CivicPulse AI is a civic issue reporting platform that empowers communities to report, track, and resolve local issues with AI-powered insights and real-time transparency."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CivicPulse AI — Community Issues. Visible Action." />
    <meta
      property="og:description"
      content="Report, track, and resolve civic issues in your community with AI-powered insights and real-time transparency."
    />
    <meta property="og:site_name" content="CivicPulse AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0F766E" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
